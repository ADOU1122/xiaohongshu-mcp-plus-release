services:
  xiaohongshu-mcp-plus:
    image: docker-xiaohongshu-mcp-plus
    container_name: xiaohongshu-mcp-plus
    ports:
      - "18068:18060"
    environment:
      TZ: Asia/Shanghai
      ROD_BROWSER_BIN: /usr/bin/google-chrome
      COOKIES_PATH: /app/data/cookies.json
    volumes:
      - /Users/adou/xhs-plus-runtime/plus-data:/app/data
      - /Users/adou/xhs-plus-runtime/plus-images:/app/images
    restart: unless-stopped
